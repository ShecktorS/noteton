<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1024" height="1024" viewBox="0 0 1024 1024">

  <defs>
    <!--
      Clip region: the inner area between the two bars, inset 20px
      from each bar face so the diagonals never touch the bars.
      Left bar right edge: 336  → clip starts at 356
      Right bar left edge: 688  → clip ends at 668
    -->
    <clipPath id="inner">
      <rect x="356" y="196" width="312" height="632"/>
    </clipPath>
  </defs>

  <!-- Background: deeper, richer navy -->
  <rect width="1024" height="1024" fill="#0D1B2E" rx="184.32"/>

  <!-- Left vertical bar (white) -->
  <rect x="256" y="196" width="80" height="632" fill="#FFFFFF" rx="6"/>

  <!-- Right vertical bar (white) -->
  <rect x="688" y="196" width="80" height="632" fill="#FFFFFF" rx="6"/>

  <!--
    Double diagonal (gold), clipped to inner region.
    Direction vector: (354, 624)  unit=(0.494, 0.871)
    Perp unit: (0.871, -0.494)

    D1 center axis: (310, 212) → (664, 836)
    D2 center axis: offset +72px perp from D1
                    D2 = (373, 176) → (727, 800)

    Perpendicular gap between D1 and D2: 72 - 52 = 20px  ✓
    stroke-linecap="butt" for clean rectangular ends after clipping
  -->
  <g clip-path="url(#inner)">
    <line x1="310" y1="212" x2="664" y2="836"
          stroke="#EDE0C4" stroke-width="52" stroke-linecap="butt"/>
    <line x1="373" y1="176" x2="727" y2="800"
          stroke="#EDE0C4" stroke-width="52" stroke-linecap="butt"/>
  </g>

</svg>
