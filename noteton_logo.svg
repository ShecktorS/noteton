<?xml version="1.0" encoding="UTF-8"?>
<!--
  Noteton logo — "N" con tripla linea (stile pentagramma) + note musicali agli angoli
  Colori: navy #1B3560 per le linee, blu #2B7EC1 per le note head
  Canvas: 1024×1024, sfondo bianco trasparente
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="1024" height="1024" viewBox="0 0 1024 1024">

  <!-- Sfondo bianco -->
  <rect width="1024" height="1024" fill="#FFFFFF"/>

  <!--
    Geometria della N:
      TL = (290, 196)   TR = (734, 196)
      BL = (290, 782)   BR = (734, 782)

    Tre linee parallele per segmento, passo 16 px.
    Spessore stroke: 9 px  stroke-linecap="round"

    DIAGONALE TL→BR  vettore (444, 586)  |v|≈735
      unit = (0.604, 0.797)
      perp (upper-right) = (0.797, -0.604)
      offset ±16 px:
        low-left : (-12.8, +9.7)
        up-right : (+12.8, -9.7)
  -->

  <g stroke="#1B3560" stroke-width="9" stroke-linecap="round" fill="none">

    <!-- Segmento sinistro verticale -->
    <line x1="274" y1="196" x2="274" y2="782"/>
    <line x1="290" y1="196" x2="290" y2="782"/>
    <line x1="306" y1="196" x2="306" y2="782"/>

    <!-- Segmento diagonale TL → BR -->
    <!-- offset lower-left -->
    <line x1="277" y1="206" x2="721" y2="792"/>
    <!-- center -->
    <line x1="290" y1="196" x2="734" y2="782"/>
    <!-- offset upper-right -->
    <line x1="303" y1="186" x2="747" y2="772"/>

    <!-- Segmento destro verticale -->
    <line x1="718" y1="196" x2="718" y2="782"/>
    <line x1="734" y1="196" x2="734" y2="782"/>
    <line x1="750" y1="196" x2="750" y2="782"/>

  </g>

  <!-- Note head — in basso a sinistra (angolo BL della N) -->
  <ellipse cx="228" cy="832" rx="68" ry="45"
           transform="rotate(-22 228 832)"
           fill="#2B7EC1"/>

  <!-- Note head — in alto a destra (angolo TR della N) -->
  <ellipse cx="792" cy="148" rx="68" ry="45"
           transform="rotate(-22 792 148)"
           fill="#2B7EC1"/>

</svg>
