name: noteton
description: A modern open-source sheet music manager. Alternative to MobileSheets.
publish_to: 'none'
version: 0.9.0+17

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Database
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  sqflite_common_ffi_web: ^0.4.5+2
  path: ^1.9.0

  # PDF Rendering
  pdfx: ^2.6.0

  # File picking & storage
  file_picker: ^8.1.2
  path_provider: ^2.1.3

  # Bluetooth (page turner pedals)
  flutter_blue_plus: ^1.32.12

  # Preferences
  shared_preferences: ^2.3.2

  # Drawing / annotations
  perfect_freehand: ^2.0.2

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  archive: ^3.6.1
  share_plus: ^10.1.2
  crypto: ^3.0.3
  http: ^1.2.2
  package_info_plus: ^8.1.1

  # Audio (metronome clicks)
  audioplayers: ^6.1.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#F5F2EC"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/sounds/
